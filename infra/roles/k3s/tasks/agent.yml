---
- name: K3s Agent Systemd-Service anlegen
  ansible.builtin.template:
    src: k3s-agent.service.j2
    dest: /etc/systemd/system/k3s-agent.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart k3s

- name: K3s Agent aktivieren und starten
  ansible.builtin.service:
    name: k3s-agent
    state: started
    enabled: true
  ignore_errors: "{{ ansible_check_mode }}"
