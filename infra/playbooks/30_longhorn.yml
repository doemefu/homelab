---
# Longhorn v1.7.2 deployen: Helm Chart + Default StorageClass setzen
# Voraussetzung: 20_k3s.yml wurde ausgeführt (longhorn_prereqs auf allen Nodes installiert)
# Voraussetzung: ~/.kube/homelab.yaml existiert
#
# Ausführen mit: ansible-playbook infra/playbooks/30_longhorn.yml
#
# Hinweis: Tasks laufen via delegate_to: localhost (Helm/kubectl auf Mac).
#          hosts: k3s_server stellt sicher dass group_vars geladen werden.
#
# WICHTIG — local-path StorageClass:
#   local-path wird als Roh-Manifest von k3s verwaltet (kein HelmChart).
#   Der Patch auf is-default-class: "false" kann bei k3s-Neustart oder -Upgrade
#   zurückgesetzt werden. Playbook nach k3s-Upgrades erneut ausführen.
#   Siehe OPERATIONS.md — Abschnitt "Longhorn Storage".
- name: Longhorn — Storage Platform deployen
  hosts: k3s_server
  gather_facts: false
  run_once: true
  vars:
    kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/homelab.yaml"

  tasks:
    # --- Longhorn Helm Repo ---
    - name: Longhorn Helm Repo hinzufügen
      kubernetes.core.helm_repository:
        name: longhorn
        repo_url: https://charts.longhorn.io
        binary_path: "{{ helm_binary }}"
      delegate_to: localhost

    # --- Longhorn deployen ---
    - name: Longhorn deployen
      kubernetes.core.helm:
        name: longhorn
        chart_ref: longhorn/longhorn
        chart_version: "1.7.2"
        release_namespace: longhorn-system
        create_namespace: true
        kubeconfig: "{{ kubeconfig }}"
        binary_path: "{{ helm_binary }}"
        values_files:
          - "{{ playbook_dir }}/../../cluster/values/longhorn.yaml"
        wait: true
        wait_timeout: "15m"
      delegate_to: localhost

    # --- Readiness explizit sicherstellen ---
    - name: Warten bis longhorn-manager DaemonSet bereit ist
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: DaemonSet
        name: longhorn-manager
        namespace: longhorn-system
      register: longhorn_ds_info
      until: >
        longhorn_ds_info.resources | length > 0 and
        longhorn_ds_info.resources[0].status.numberReady is defined and
        longhorn_ds_info.resources[0].status.numberReady ==
        longhorn_ds_info.resources[0].status.desiredNumberScheduled
      retries: 30
      delay: 10
      delegate_to: localhost

    # --- local-path als non-default markieren ---
    # local-path bleibt verfügbar (z.B. für ephemere Volumes), aber Longhorn ist Default.
    # Hinweis: Patch kann bei k3s-Neustart zurückgesetzt werden — Playbook erneut ausführen.
    - name: Local-path StorageClass als non-default markieren
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        kind: StorageClass
        name: local-path
        definition:
          metadata:
            annotations:
              storageclass.kubernetes.io/is-default-class: "false"
        merge_type: merge
      delegate_to: localhost
