---
# Platform deployen: cert-manager, Cloudflare ClusterIssuer, cloudflared, Traefik-Config
# Voraussetzung: 20_k3s.yml wurde ausgeführt, ~/.kube/homelab.yaml existiert
# Voraussetzung: infra/inventory/group_vars/secrets.sops.yml existiert und ist verschlüsselt
# Voraussetzung: Cloudflare Zone ist aktiv, Tunnel wurde mit 'cloudflared tunnel create homelab' erstellt
#
# Ausführen mit: ansible-playbook infra/playbooks/40_platform.yml
#
# Hinweis: Tasks laufen via delegate_to: localhost (Helm/kubectl auf Mac).
#          hosts: k3s_server stellt sicher dass group_vars (inkl. Secrets) geladen werden.
- name: Platform — cert-manager, cloudflared, Traefik
  hosts: k3s_server
  gather_facts: false
  run_once: true
  vars:
    kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/homelab.yaml"
    platform_namespace: platform
    # helm_binary kommt aus group_vars/all.yml (zentralisiert, arch-kommentiert)

  tasks:
    # --- Namespace ---
    - name: Platform Namespace anlegen
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ platform_namespace }}"
      delegate_to: localhost

    # --- cert-manager ---
    - name: Jetstack Helm Repo hinzufügen
      kubernetes.core.helm_repository:
        name: jetstack
        repo_url: https://charts.jetstack.io
        binary_path: "{{ helm_binary }}"
      delegate_to: localhost

    - name: Cert-manager deployen
      kubernetes.core.helm:
        name: cert-manager
        chart_ref: jetstack/cert-manager
        chart_version: "v1.17.1"
        release_namespace: "{{ platform_namespace }}"
        kubeconfig: "{{ kubeconfig }}"
        binary_path: "{{ helm_binary }}"
        values_files:
          - "{{ playbook_dir }}/../../cluster/values/cert-manager.yaml"
        wait: true
        wait_timeout: "5m"
      delegate_to: localhost

    - name: Warten bis cert-manager Webhook bereit ist
      ansible.builtin.pause:
        seconds: 15

    - name: Cloudflare API Token Secret anlegen
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: cloudflare-api-token
            namespace: "{{ platform_namespace }}"
          type: Opaque
          stringData:
            api-token: "{{ cloudflare_api_token }}"
      delegate_to: localhost

    - name: ClusterIssuer letsencrypt-staging anlegen
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        definition:
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-staging
          spec:
            acme:
              server: https://acme-staging-v02.api.letsencrypt.org/directory
              email: domifur@hotmail.com
              privateKeySecretRef:
                name: letsencrypt-staging-key
              solvers:
                - dns01:
                    cloudflare:
                      apiTokenSecretRef:
                        name: cloudflare-api-token
                        key: api-token
      delegate_to: localhost

    - name: ClusterIssuer letsencrypt-prod anlegen
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        definition:
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: domifur@hotmail.com
              privateKeySecretRef:
                name: letsencrypt-prod-key
              solvers:
                - dns01:
                    cloudflare:
                      apiTokenSecretRef:
                        name: cloudflare-api-token
                        key: api-token
      delegate_to: localhost

    # --- cloudflared ---
    - name: Cloudflare Helm Repo hinzufügen
      kubernetes.core.helm_repository:
        name: cloudflare
        repo_url: https://cloudflare.github.io/helm-charts
        binary_path: "{{ helm_binary }}"
      delegate_to: localhost

    - name: Cloudflared deployen
      kubernetes.core.helm:
        name: cloudflared
        chart_ref: cloudflare/cloudflare-tunnel-remote
        chart_version: "0.1.2"
        release_namespace: "{{ platform_namespace }}"
        kubeconfig: "{{ kubeconfig }}"
        binary_path: "{{ helm_binary }}"
        values_files:
          - "{{ playbook_dir }}/../../cluster/values/cloudflared.yaml"
        values:
          cloudflare:
            tunnel_token: "{{ cloudflared_tunnel_token }}"
        wait: true
        wait_timeout: "3m"
      delegate_to: localhost

    # --- Traefik: HTTP → HTTPS Redirect ---
    - name: Traefik HelmChartConfig — HTTP zu HTTPS Redirect
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        definition:
          apiVersion: helm.cattle.io/v1
          kind: HelmChartConfig
          metadata:
            name: traefik
            namespace: kube-system
          spec:
            valuesContent: |
              ports:
                web:
                  redirections:
                    entryPoint:
                      to: websecure
                      scheme: https
                      permanent: true
              logs:
                general:
                  level: INFO
      delegate_to: localhost
