---
# Platform deployen: cert-manager, Cloudflare ClusterIssuer, cloudflared, Traefik-Config
# Voraussetzung: 20_k3s.yml wurde ausgeführt, ~/.kube/homelab.yaml existiert
# Voraussetzung: infra/inventory/group_vars/secrets.sops.yml existiert und ist verschlüsselt
# Voraussetzung: Cloudflare Zone ist aktiv, Tunnel wurde mit 'cloudflared tunnel create homelab' erstellt
#
# Ausführen mit: ansible-playbook infra/playbooks/40_platform.yml
# Monitoring (kube-prometheus-stack): → 41_monitoring.yml (ausgelagert wegen langer Helm-Wartezeit)
#
# Hinweis: Tasks laufen via delegate_to: localhost (Helm/kubectl auf Mac).
#          hosts: k3s_server stellt sicher dass group_vars (inkl. Secrets) geladen werden.
- name: Platform — cert-manager, cloudflared, Traefik
  hosts: k3s_server
  gather_facts: false
  run_once: true
  vars:
    kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/homelab.yaml"
    platform_namespace: platform
    # helm_binary kommt aus group_vars/all.yml (zentralisiert, arch-kommentiert)

  tasks:
    # --- Namespace ---
    - name: Platform Namespace anlegen
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ platform_namespace }}"
      delegate_to: localhost

    # --- cert-manager ---
    - name: Jetstack Helm Repo hinzufügen
      kubernetes.core.helm_repository:
        name: jetstack
        repo_url: https://charts.jetstack.io
        binary_path: "{{ helm_binary }}"
      delegate_to: localhost

    - name: Helm Repo Cache aktualisieren
      ansible.builtin.command:
        argv:
          - "{{ helm_binary }}"
          - repo
          - update
      delegate_to: localhost
      changed_when: false

    - name: Cert-manager deployen
      kubernetes.core.helm:
        name: cert-manager
        chart_ref: jetstack/cert-manager
        chart_version: "v1.17.1"
        release_namespace: "{{ platform_namespace }}"
        kubeconfig: "{{ kubeconfig }}"
        binary_path: "{{ helm_binary }}"
        values_files:
          - "{{ playbook_dir }}/../../cluster/values/cert-manager.yaml"
        wait: true
        wait_timeout: "5m"
      delegate_to: localhost

    - name: Warten bis cert-manager Webhook bereit ist
      ansible.builtin.pause:
        seconds: 15

    - name: Cloudflare API Token Secret anlegen
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: cloudflare-api-token
            namespace: "{{ platform_namespace }}"
          type: Opaque
          stringData:
            api-token: "{{ cloudflare_api_token }}"
      delegate_to: localhost

    - name: ClusterIssuer letsencrypt-staging anlegen
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        definition:
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-staging
          spec:
            acme:
              server: https://acme-staging-v02.api.letsencrypt.org/directory
              email: domifur@hotmail.com
              privateKeySecretRef:
                name: letsencrypt-staging-key
              solvers:
                - dns01:
                    cloudflare:
                      apiTokenSecretRef:
                        name: cloudflare-api-token
                        key: api-token
      delegate_to: localhost

    - name: ClusterIssuer letsencrypt-prod anlegen
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        definition:
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: domifur@hotmail.com
              privateKeySecretRef:
                name: letsencrypt-prod-key
              solvers:
                - dns01:
                    cloudflare:
                      apiTokenSecretRef:
                        name: cloudflare-api-token
                        key: api-token
      delegate_to: localhost

    # --- cloudflared ---
    - name: Cloudflare Helm Repo hinzufügen
      kubernetes.core.helm_repository:
        name: cloudflare
        repo_url: https://cloudflare.github.io/helm-charts
        binary_path: "{{ helm_binary }}"
      delegate_to: localhost

    - name: Cloudflared deployen
      kubernetes.core.helm:
        name: cloudflared
        chart_ref: cloudflare/cloudflare-tunnel-remote
        chart_version: "0.1.2"
        release_namespace: "{{ platform_namespace }}"
        kubeconfig: "{{ kubeconfig }}"
        binary_path: "{{ helm_binary }}"
        values_files:
          - "{{ playbook_dir }}/../../cluster/values/cloudflared.yaml"
        values:
          cloudflare:
            tunnel_token: "{{ cloudflared_tunnel_token }}"
        wait: true
        wait_timeout: "3m"
      delegate_to: localhost

    - name: CF Ingress-Konfiguration als Variable setzen
      ansible.builtin.set_fact:
        cf_ingress_body:
          config:
            ingress:
              - hostname: "ssh.furchert.ch"
                service: "ssh://192.168.1.61:22"
              - hostname: "grafana.furchert.ch"
                service: "http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local:80"
              - hostname: "auth.furchert.ch"
                service: "http://auth-service.apps.svc.cluster.local:8080"
              - hostname: "device.furchert.ch"
                service: "http://device-service.apps.svc.cluster.local:8081"
              - hostname: "n8n.furchert.ch"
                service: "http://n8n.apps.svc.cluster.local:80"
              - hostname: "ai.furchert.ch"
                service: "http://litellm.apps.svc.cluster.local:4000"
              - service: "http_status:404"

    - name: Cloudflare Tunnel Ingress via API setzen (SSH raspi5 + Fallback 404)
      ansible.builtin.uri:
        url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflare_account_id }}/cfd_tunnel/{{ cloudflare_tunnel_id }}/configurations"
        method: PUT
        headers:
          Authorization: "Bearer {{ cloudflare_tunnel_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body: "{{ cf_ingress_body }}"
        status_code: 200
      delegate_to: localhost
      no_log: true

    - name: Cloudflared Pod neustarten wenn Ingress-Konfiguration geändert
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        kind: Deployment
        name: cloudflared-cloudflare-tunnel-remote
        namespace: "{{ platform_namespace }}"
        definition:
          spec:
            template:
              metadata:
                annotations:
                  # Hash der Ingress-Config als stabile Annotation — Pod-Restart nur bei Config-Änderung
                  kubectl.kubernetes.io/restartedAt: "{{ cf_ingress_body | to_json | hash('sha256') }}"
      delegate_to: localhost

    # --- Traefik: HTTP → HTTPS Redirect + Prometheus Metrics ---
    - name: Traefik HelmChartConfig — HTTP zu HTTPS Redirect + Metrics
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig }}"
        definition:
          apiVersion: helm.cattle.io/v1
          kind: HelmChartConfig
          metadata:
            name: traefik
            namespace: kube-system
          spec:
            valuesContent: |
              ports:
                web:
                  redirections:
                    entryPoint:
                      to: websecure
                      scheme: https
                      permanent: true
                metrics:
                  port: 9101
                  expose:
                    default: true
              logs:
                general:
                  level: INFO
              metrics:
                prometheus:
                  entryPoint: metrics
                  addEntryPointsLabels: true
                  addRoutersLabels: true
                  addServicesLabels: true
      delegate_to: localhost

    # ServiceMonitors + kube-prometheus-stack → 41_monitoring.yml
    # (ausgelagert wegen wait_timeout: 10m — SSH-Tunnel bricht sonst ab)
