# pi5 ist der Backup-Target — hat USB/SSD für Restic
storage_has_external_backup: true
storage_backup_device: ""  # TODO: Gerätepfad eintragen wenn SSD angeschlossen
                            # Beispiel: /dev/disk/by-uuid/XXXX-XXXX
