---
# cloudflared Helm Values
# Chart: cloudflare/cloudflare-tunnel-remote 0.1.2
# Repo:  https://cloudflare.github.io/helm-charts
#
# tunnelToken: wird von 40_platform.yml aus all.sops.yml injiziert — nicht hier hinterlegen
#
# Ingress-Regeln: werden via Cloudflare API gesetzt (40_platform.yml, uri-Task PUT)
# Hintergrund: cloudflare-tunnel-remote 0.1.2 nutzt token-basiertes Setup ("locally configured
# tunnel") — Ingress kann nicht via Helm Values gesteuert werden, nur via API.
#
# Aktuelle Ingress-Regeln (Single Source of Truth: 40_platform.yml):
#   - hostname: ssh.furchert.ch     → ssh://192.168.1.61:22  (raspi5 SSH)
#   - hostname: grafana.furchert.ch → http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local:80
#   - hostname: auth.furchert.ch    → http://auth-service.apps.svc.cluster.local:8080
#   - service:  http_status:404     (Fallback — alle anderen Anfragen)
#
# Neuen Service hinzufügen: Ingress-Liste in 40_platform.yml ergänzen,
# dann ansible-playbook infra/playbooks/40_platform.yml ausführen.
#
# Sicherheitsprinzip: alles was nicht explizit gelistet ist → 404, nie → Traefik

image:
  tag: "2025.2.1"  # gepinnt — nie latest

replicaCount: 1

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
