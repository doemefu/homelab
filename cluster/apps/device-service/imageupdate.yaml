apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: device-service
  namespace: flux-system
spec:
  interval: 2m
  sourceRef:
    kind: GitRepository
    name: device-service
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: flux@users.noreply.github.com
        name: Flux
      messageTemplate: "chore: update device-service image to {{range .Updated.Images}}{{.}}{{end}}"
    push:
      branch: main
  update:
    path: ./k8s
    strategy: Setters
