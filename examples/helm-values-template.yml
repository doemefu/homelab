# helm-values-template.yml
#
# Starting point for custom Helm chart values in this cluster.
# Copy to cluster/values/<chart-name>.yaml and adapt.
#
# Convention (CLAUDE.md):
#   - All Helm values go in cluster/values/<chart-name>.yaml — never inline in playbooks.
#   - Pin chart version in the kubernetes.core.helm task (chart_version: "x.y.z").
#   - Secrets are injected via the Ansible helm task values: dict from SOPS — not here.
#   - No `latest` tags for images.

---
# Chart metadata (comment only — for reference when reading the file)
# Chart: <repo>/<chart-name> vX.Y.Z
# Repo:  https://example.github.io/helm-charts

# Number of replicas.
# For stateless apps: 2+ for availability; for stateful apps with single PVC: 1.
replicaCount: 1

image:
  # Pin the exact tag — never use 'latest'.
  tag: "1.2.3"
  pullPolicy: IfNotPresent

# Resource limits are required for all apps namespace workloads.
# Baseline for ARM64 Pi hardware — adjust after checking kubectl top pods.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Persistence — uses Longhorn (default StorageClass, RF=2) when no storageClass is set.
persistence:
  enabled: false
  # size: 1Gi
  # storageClass: ""   # empty → Longhorn default; use "local-path" for non-replicated scratch
  # accessMode: ReadWriteOnce

# Ingress — disabled; public access is via Cloudflare Tunnel (see APPS.md).
# Do not enable Kubernetes Ingress for public exposure in this cluster.
ingress:
  enabled: false

# Service — ClusterIP is sufficient; Cloudflare Tunnel accesses via cluster-internal FQDN.
service:
  type: ClusterIP
  port: 80

# Environment variables and secrets.
# Non-secret values can be set here.
# Secret values (passwords, tokens) must come from SOPS — inject via the Ansible task
# values: dict (no_log: true), not here.
# env:
#   MY_CONFIG_VALUE: "some-value"

# ServiceAccount — no cluster-admin (CLAUDE.md non-negotiable).
serviceAccount:
  create: true
  # annotations: {}

# Pod security context — run as non-root where possible.
# podSecurityContext:
#   runAsNonRoot: true
#   runAsUser: 1000
#   fsGroup: 1000
